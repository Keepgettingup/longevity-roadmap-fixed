<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Brain Stimulation – Knowledge Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050510;
    color: #e0e0e0;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────── */
  #page-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: rgba(8,6,22,0.97);
    border-bottom: 1px solid rgba(241,196,15,0.25);
    backdrop-filter: blur(12px);
  }
  #page-header h1 {
    font-size: 14px;
    font-weight: 700;
    color: #f1c40f;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #page-header p {
    font-size: 10px;
    color: rgba(241,196,15,0.5);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  #back-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    background: none;
    border: 1px solid rgba(241,196,15,0.35);
    color: #f1c40f;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  #back-btn:hover { background: rgba(241,196,15,0.1); }

  /* ── MAIN CONTENT ────────────────────────── */
  #main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 28px 60px;
    animation: pageIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION GRID ────────────────────────── */
  .sections-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-top: 28px;
  }

  /* ── BRANCH CARD ─────────────────────────── */
  .branch-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: visible;
    opacity: 0;
    animation: cardIn 0.38s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .branch-card:hover { border-color: rgba(241,196,15,0.2); }

  .branch-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    user-select: none;
  }
  .branch-card-header:hover { background: rgba(255,255,255,0.06); }
  .branch-card-title {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    flex: 1;
  }
  .branch-card-type {
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.07);
  }
  .expand-arrow {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    transition: transform 0.2s;
  }
  .branch-card.collapsed .expand-arrow { transform: rotate(-90deg); }
  .branch-card.collapsed .nodes-wrap { display: none; }

  .nodes-wrap {
    display: flex;
    flex-wrap: wrap;
    column-gap: 46px;
    row-gap: 12px;
    padding: 14px 16px;
    overflow: visible;
  }

  /* ── NODE PILL ───────────────────────────── */
  .node-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 11px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    font-size: 11px;
    color: #f5e97a;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
  }
  .node-pill:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(241,196,15,0.35);
    transform: translateY(-1px);
  }
  .node-pill.has-arms {
    border-color: rgba(241,196,15,0.2);
    box-shadow: 0 0 0 1px rgba(241,196,15,0.04), 0 0 18px rgba(241,196,15,0.04);
  }
  .node-pill.has-arms:hover {
    box-shadow: 0 0 0 1px rgba(241,196,15,0.12), 0 0 24px rgba(241,196,15,0.12);
  }
  .node-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .node-badge {
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .node-arms {
    position: absolute;
    left: calc(100% - 2px);
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-left: 20px;
    pointer-events: none;
    z-index: 20;
  }
  .node-arm {
    position: relative;
    width: 34px;
    height: 10px;
    pointer-events: auto;
  }
  .node-arm::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 4px;
    width: 36px;
    height: 2px;
    background: linear-gradient(90deg, var(--arm-color, rgba(241,196,15,0.65)), var(--arm-color-fade, rgba(241,196,15,0.16)));
    border-radius: 99px;
  }
  .node-arm::after {
    content: '';
    position: absolute;
    right: 0;
    top: 1px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--arm-color, #f1c40f);
    box-shadow: 0 0 12px var(--arm-color-glow, rgba(241,196,15,0.55));
  }
  .node-arm:hover::before {
    background: linear-gradient(90deg, var(--arm-color, rgba(241,196,15,0.95)), var(--arm-color-fade, rgba(241,196,15,0.42)));
  }
  .node-arm:hover::after {
    transform: scale(1.25);
    box-shadow: 0 0 18px var(--arm-color-glow, rgba(241,196,15,0.85));
  }
  .arm-tooltip {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%) translateX(-4px);
    padding: 7px 10px;
    border: 1px solid rgba(241,196,15,0.32);
    border-radius: 10px;
    background: rgba(10,8,26,0.98);
    color: rgba(255,255,255,0.9);
    font-size: 10px;
    line-height: 1.25;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.16s, transform 0.16s;
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
  }
  .node-arm:hover .arm-tooltip {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  .fly-projectile {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.55s ease-out;
  }

  /* ── CATEGORY BUBBLE ─────────────────────── */
  .cat-bubble {
    position: fixed;
    background: rgba(15,12,35,0.98);
    border: 1px solid rgba(241,196,15,0.3);
    border-radius: 14px;
    padding: 10px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 170px;
    max-width: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: bubbleIn 0.18s ease both;
  }
  @keyframes bubbleIn {
    from { opacity:0; transform: scale(0.9) translateY(-6px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .cat-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    transition: background 0.15s;
  }
  .cat-option:hover { background: rgba(255,255,255,0.08); }
  .cat-icon { font-size: 14px; }

  /* ── STATS BAR ───────────────────────────── */
  #stats-bar {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .stat-item { font-size: 11px; color: rgba(255,255,255,0.4); }
  .stat-item strong { color: #f1c40f; }
</style>
</head>

        "https://pubmed.ncbi.nlm.nih.gov/?term=transcranial+focused+ultrasound+planning+CT+radiation+pseudo-CT",
        "Replacing CT with pseudo-CT for skull aberration correction removes ionizing radiation from the FUS planning workflow — full MRI-only pipeline."
      ]},
      { id:"dbs_pct_pipeline", label:"Full MRI-only pipeline: ZTE→pseudo-CT→aberration correction→FUS sim", type:"method", arms3d:["ce_fus","mc_optics"], sources:[
        "https://pubmed.ncbi.nlm.nih.gov/?term=MRI-only+transcranial+focused+ultrasound+pipeline+pseudo-CT",
        "End-to-end: acquire ZTE MRI → generate pseudo-CT → compute skull aberration map → run time-reversal/hybrid aberration correction → simulate FUS focal spot."
      ]},
    ]},
    { id:"dbs_suppliers", label:"Suppliers & Institutes", type:"resource", nodes:[
      { id:"dbs_fhc",      label:"FHC Inc.", type:"resource" },
      { id:"dbs_wpi",      label:"World Precision Instruments", type:"resource" },
      { id:"dbs_sutter",   label:"Sutter Instruments", type:"resource" },
      { id:"dbs_narishige",label:"Narishige", type:"resource" },
      { id:"dbs_neuralynx",label:"Neuralynx", type:"resource" },
    ]},
    { id:"dbs_us_nav", label:"Ultrasound Navigation Theory", type:"theory", nodes:[
      { id:"dbs_us_memory_rod", label:"Memory-Metal Glass Rod", type:"device", arms3d:["na_flexprobe","mc_fab"] },
      { id:"dbs_us_nitinol", label:"Nitinol (Ni-Ti Shape Memory Alloy)", type:"resource", arms3d:["mc_fab","na_mxene"] },
      { id:"dbs_us_magnetic_ink", label:"Magnetic Ink Patches (Nitinol+Fe3O4)", type:"resource", arms3d:["mc_fab"] },
      { id:"dbs_us_trigger", label:"Ultrasound Triggering of Patches", type:"mechanism", arms3d:["ce_fus","na_rec"] },
      { id:"dbs_us_memory_movement", label:"Memory-Metal Directional Change", type:"mechanism", arms3d:["na_rec","ce_neu"] },
      { id:"dbs_us_bend_left", label:"Left Bend Activation", type:"method", arms3d:["ce_fus"] },
      { id:"dbs_us_bend_right", label:"Right Bend Activation", type:"method", arms3d:["ce_fus"] },
      { id:"dbs_us_curve", label:"Vascular Curve Navigation", type:"method", arms3d:["ce_fus","mc_optics"] },
      { id:"dbs_us_tissue_safe", label:"Tissue-Safe Non-Invasive Steering", type:"theory", arms3d:["ce_fus","bp_regen"] },
    ]},
    { id:"dbs_gaps", label:"Open Questions", type:"gap", nodes:[
      { id:"gap_dbs_flex",     label:"❓ Flexible Cannula Stiffness", type:"gap" },
      { id:"gap_dbs_calib",    label:"❓ Ultrasound Focal Calibration", type:"gap" },
      { id:"gap_dbs_access",   label:"⚠️ Lab Access (no institution)", type:"gap" },
      { id:"gap_dbs_ptir_vs_w",label:"⚖️ Pt-Ir vs Tungsten (competing)", type:"gap" },
    ]},
  ]
};

// ── RENDER ────────────────────────────────────────────────────────────────────
const grid = document.getElementById('sections-grid');
const statsBar = document.getElementById('stats-bar');

function escapeHtml(value) {
  return String(value).replace(/[&<>"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[char]));
}
function getArms(node) {
  const ids = node.arms3d || (node.arm3d ? [node.arm3d] : []);
  return ids.map(id => ({ id, label: CROSS_3D_LABELS[id] || id, color: CROSS_3D_COLORS[id] || '#f1c40f' }));
}

let totalNodes = 0;
let totalArms = 0;
DBS_DATA.sections.forEach(s => {
  totalNodes += s.nodes.length;
  s.nodes.forEach(n => { totalArms += getArms(n).length; });
});
statsBar.innerHTML = `
  <div class="stat-item"><strong>${DBS_DATA.sections.length}</strong> Sections</div>
  <div class="stat-item"><strong>${totalNodes}</strong> Nodes</div>
  <div class="stat-item"><strong>${totalArms}</strong> 3D-Cross-Arms</div>
  <div class="stat-item">Deep Brain Stimulation full knowledge map</div>
`;

DBS_DATA.sections.forEach((sec, i) => {
  const secColor = TYPE_COLORS[sec.type] || '#aaa';
  const card = document.createElement('div');
  card.className = 'branch-card';
  card.style.animationDelay = `${0.05 + i * 0.06}s`;

  const header = document.createElement('div');
  header.className = 'branch-card-header';
  header.innerHTML = `
    <span class="expand-arrow">▼</span>
    <span class="branch-card-title">${sec.label}</span>
    <span class="branch-card-type" style="color:${secColor}">${TYPE_LABELS[sec.type]||sec.type}</span>
  `;
  header.onclick = () => card.classList.toggle('collapsed');

  const wrap = document.createElement('div');
  wrap.className = 'nodes-wrap';

  sec.nodes.forEach(n => {
    const nColor = TYPE_COLORS[n.type] || '#aaa';
    const badge = BADGE_MAP[n.id];
    const arms = getArms(n);
    const pill = document.createElement('div');
    pill.className = `node-pill${arms.length ? ' has-arms' : ''}`;
    pill.innerHTML = `
      <span class="node-dot" style="background:${nColor}"></span>
      <span>${n.label}</span>
      ${badge ? `<span class="node-badge" style="background:${BADGE_COLORS[badge]}22;color:${BADGE_COLORS[badge]};border:1px solid ${BADGE_COLORS[badge]}44">${badge}</span>` : ''}
      <span style="font-size:11px;color:rgba(241,196,15,0.5);margin-left:2px;">+</span>
      ${arms.length ? `<span class="node-arms">${arms.map(arm => `<span class="node-arm" data-target-id="${escapeHtml(arm.id)}" style="--arm-color:${arm.color};--arm-color-fade:${arm.color}26;--arm-color-glow:${arm.color}8c"><span class="arm-tooltip">${escapeHtml(arm.label)}</span></span>`).join('')}</span>` : ''}
    `;
    pill.onclick = (e) => showCatBubble(e, n, sec);
    wrap.appendChild(pill);
  });

  card.appendChild(header);
  card.appendChild(wrap);
  grid.appendChild(card);

  // Double-click on arms: fly to 3D map (after card is in DOM)
  card.querySelectorAll('.node-arm').forEach(arm => {
    arm.addEventListener('click', (e) => {
      e.stopPropagation();
    });
    arm.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const targetId = arm.getAttribute('data-target-id');
      const color = arm.style.getPropertyValue('--arm-color') || '#f1c40f';
      const rect = arm.getBoundingClientRect();
      const startX = rect.left + rect.width / 2;
      const startY = rect.top + rect.height / 2;

      const proj = document.createElement('div');
      proj.className = 'fly-projectile';
      proj.style.left = startX + 'px';
      proj.style.top = startY + 'px';
      proj.style.background = color;
      proj.style.boxShadow = `0 0 16px ${color}, 0 0 32px ${color}80`;
      proj.style.opacity = '1';
      document.body.appendChild(proj);

      requestAnimationFrame(() => {
        const endX = window.innerWidth + 50;
        const endY = -50;
        const dx = endX - startX;
        const dy = endY - startY;
        proj.style.transform = `translate(${dx}px, ${dy}px) scale(0.3)`;
        proj.style.opacity = '0';
      });

      setTimeout(() => {
        window.location.href = `index.html?focus=${encodeURIComponent(targetId)}`;
      }, 550);
    });
  });
});

// ── CATEGORY BUBBLE ───────────────────────────────────────────────────────────
function showCatBubble(e, nodeData, secData) {
  document.querySelectorAll('.cat-bubble').forEach(b => b.remove());
  const bubble = document.createElement('div');
  bubble.className = 'cat-bubble';
  const rect = e.currentTarget.getBoundingClientRect();
  bubble.style.left = Math.min(rect.right + 10, window.innerWidth - 200) + 'px';
  bubble.style.top  = rect.top + 'px';

  const cats = [
    { id:'diy',     icon:'🔧', label:'DIY / Build' },
    { id:'buy',     icon:'🛒', label:'Buy / Suppliers' },
    { id:'fact',    icon:'📚', label:'Fact / Learn' },
    { id:'video',   icon:'🎥', label:'Video' },
    { id:'dataset', icon:'📊', label:'Dataset' },
    { id:'rnd',     icon:'🔬', label:'R&D / Paper' },
  ];
  cats.forEach(cat => {
    const opt = document.createElement('div');
    opt.className = 'cat-option';
    opt.innerHTML = `<span class="cat-icon">${cat.icon}</span><span>${cat.label}</span>`;
    opt.onclick = () => { bubble.remove(); alert(`${cat.label} für: ${nodeData.label}\n(Coming soon)`); };
    bubble.appendChild(opt);
  });

  if (nodeData.sources && nodeData.sources.length) {
    const srcHeader = document.createElement('div');
    srcHeader.style.cssText = 'font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(241,196,15,0.6);padding:6px 10px 2px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;';
    srcHeader.textContent = 'Sources & Info';
    bubble.appendChild(srcHeader);

    nodeData.sources.forEach(src => {
      const srcEl = document.createElement('div');
      srcEl.className = 'cat-option';
      if (src.startsWith('http')) {
        srcEl.innerHTML = `<span class="cat-icon">🔗</span><span style="font-size:10px;color:rgba(135,206,235,0.9);text-decoration:underline;">${src.length > 50 ? src.slice(0, 50) + '…' : src}</span>`;
        srcEl.onclick = () => window.open(src, '_blank');
      } else {
        srcEl.innerHTML = `<span class="cat-icon">📖</span><span style="font-size:10px;line-height:1.3;white-space:normal;">${src}</span>`;
        srcEl.style.cursor = 'default';
      }
      bubble.appendChild(srcEl);
    });
  }

  document.body.appendChild(bubble);
  setTimeout(() => {
    document.addEventListener('click', function close(ev) {
      if (!bubble.contains(ev.target)) { bubble.remove(); document.removeEventListener('click', close); }
    });
  }, 10);
}
</script>
